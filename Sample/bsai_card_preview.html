<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackbucks School of AI Card Preview</title>
  <style>
    body {
      background-color: #f8f9fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .bsai-card {
      background: #ffffff;
      /* Very light and subtle border */
      border: 1px solid rgba(0, 0, 0, 0.03); 
      border-radius: 20px;
      padding: 26px 24px 20px;
      
      /* Multi-layered light shadow for depth without being overwhelming */
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.03), 0 1px 4px rgba(0, 0, 0, 0.02);
      
      width: 360px;
      cursor: pointer;
      
      /* Smooth, bouncy transition */
      transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .bsai-card:hover {
      /* Stronger but highly diffused shadow on hover */
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.06), 0 4px 10px rgba(0, 0, 0, 0.03);
      
      /* Slight lift up */
      transform: translateY(-4px);
      border-color: rgba(0,0,0,0.06);
    }

    .bsai-card h2 {
      font-size: 19px;
      font-weight: 700;
      margin: 0 0 6px 0;
      color: #111;
      letter-spacing: -0.01em;
    }

    .bsai-sub {
      font-size: 13px;
      color: #777;
      margin: 0 0 20px 0;
      line-height: 1.5;
    }

    .bsai-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 16px 0 10px;
      color: #444;
    }

    .bsai-links-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
    }

    /* TEXT STYLE (no blue, no link feel) */
    .bsai-links-grid a,
    .bsai-link-single {
      color: #333;
      text-decoration: none;
      font-size: 13.5px;
      white-space: nowrap;
      pointer-events: none;   /* disable individual clicks */
      cursor: default;
      display: flex;
      align-items: center;
    }
    
    /* Subtle dot replacing regular bullets */
    .bsai-links-grid a::before,
    .bsai-link-single::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background-color: #A78BFA; /* Soft purple accent */
      margin-right: 8px;
    }

    .bsai-link-single {
      display: block;
      margin-top: 10px;
    }

    .bsai-divider {
      border: none;
      border-top: 1px solid rgba(0,0,0,0.04);
      margin: 18px 0;
    }
  </style>
</head>
<body>

  <!-- FULL CARD CLICKABLE -->
  <div class="bsai-card" onclick="window.open('https://blackbucks-ai-school-slxjk4b.gamma.site/', '_blank')">

    <h2>Blackbucks School of AI</h2>
    <p class="bsai-sub">
      AI-integrated degree pathways<br>
      powered by Blackbucks platform
    </p>

    <div class="bsai-section-label">Degree Programs</div>
    <div class="bsai-links-grid">
      <a>B.Tech AI</a>
      <a>BBA AI</a>
      <a>MBA AI</a>
      <a>M.Tech AI</a>
    </div>

    <hr class="bsai-divider">

    <div class="bsai-section-label">Certifications</div>
    <div class="bsai-links-grid">
      <a>AI</a>
      <a>Data Science</a>
    </div>
    <a class="bsai-link-single">Cybersecurity</a>

    <hr class="bsai-divider">

    <div class="bsai-section-label">Skill Courses</div>
    <div class="bsai-links-grid">
      <a>Full Stack</a>
      <a>Aptitude</a>
    </div>
    <a class="bsai-link-single">Placement Readiness</a>

  </div>

</body>
</html>
